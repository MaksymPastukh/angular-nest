services:
  mongo:
    image: mongo:7
    container_name: marketplace-mongo
    restart: unless-stopped
    ports:
      - "27018:27017"
    environment:
      # можно убрать, если у тебя без авторизации
      MONGO_INITDB_DATABASE: marketplace
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: