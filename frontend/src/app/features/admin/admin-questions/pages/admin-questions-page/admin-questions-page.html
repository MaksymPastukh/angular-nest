<div class="space-y-4">
  <header class="flex items-center justify-between">
    <h1 class="text-xl font-semibold">Q&A — Вопросы пользователей</h1>
  </header>

  <div class="flex flex-wrap items-center gap-3 rounded-2xl border p-3">
    <div class="flex items-center gap-2">
      <span class="text-sm text-gray-600">Статус:</span>
      <p-select
        [options]="statusOptions"
        optionLabel="label"
        optionValue="value"
        [ngModel]="facade.filter().status"
        (onChange)="onStatusChange($event)"
        placeholder="Выберите статус"
      />
    </div>

    <div class="text-sm text-gray-600">
      @if (facade.filter().productId) {
        Фильтр по продукту: <span class="font-medium">{{ facade.filter().productId }}</span>
        <button
          pButton
          type="button"
          label="Сбросить"
          severity="secondary"
          size="small"
          class="ml-2"
          (click)="facade.setProductId(null)"
        >
          Сбросить
        </button>
      }
    </div>
  </div>

  @if (facade.error(); as err) {
    <div class="rounded-xl border border-red-200 bg-red-50 p-3 text-sm text-red-700">
      {{ err.message }}
    </div>
  }

  <p-table [value]="facade.items()" [loading]="facade.isLoading()" [rowHover]="true" dataKey="id">
    <ng-template pTemplate="header">
      <tr>
        <th class="w-56">Продукт</th>
        <th>Вопрос</th>
        <th class="w-56">Пользователь</th>
        <th class="w-40">Дата</th>
        <th class="w-40"></th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-q>
      <tr>
        <td class="text-sm text-gray-700">{{ q.productId }}</td>
        <td>
          <div class="whitespace-pre-wrap font-medium">{{ q.question }}</div>
        </td>
        <td class="text-sm text-gray-700">{{ q.userName }}</td>
        <td class="text-sm text-gray-500">{{ q.createdAt | date: 'short' }}</td>
        <td class="text-right">
          <button
            pButton
            type="button"
            label="Ответить"
            size="small"
            [disabled]="facade.isSubmitting()"
            (click)="openAnswer(q)"
          >
            Ответить
          </button>
        </td>
      </tr>
    </ng-template>
  </p-table>

  <div class="flex justify-end">
    <p-paginator
      [rows]="facade.pageSize()"
      [totalRecords]="facade.total()"
      [first]="(facade.page() - 1) * facade.pageSize()"
      (onPageChange)="facade.changePageFromPrime($event)"
    />
  </div>

  <app-answer-question-dialog
    [visible]="answerDialogOpen()"
    [question]="selectedQuestion()"
    [isSubmitting]="facade.isSubmitting()"
    (visibleChange)="onDialogVisibleChange($event)"
    (submitAnswer)="onSubmitAnswer($event)"
  />
</div>
